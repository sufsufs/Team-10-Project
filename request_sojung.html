<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Feed - Request News</title>
    <style>
        /* General styling */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        /* Menu Bar */
        .menu-bar {
            background-color: #2c3e50;
            color: white;
            padding: 10px 0;
            position: relative;
            text-align: center;
        }

        .menu-bar h1 {
            font-size: 2.5rem;
            margin: 0;
            color: white;
        }

        .profile-button {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
        }

        .profile-button img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* Dropdown menu styling */
        .dropdown {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            overflow: hidden;
            z-index: 1; /* Ensure dropdown is on top */
        }

        .dropdown a {
            display: block;
            padding: 10px 15px;
            color: #333;
            text-decoration: none;
        }

        .dropdown a:hover {
            background-color: #f5f5f5;
        }


        .container {
            width: 80%;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        /* Styling for form elements */
        .filter-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-form label {
            font-size: 1.1rem;
            color: #333;
        }

        .filter-form input, .filter-form select, .filter-form button {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .filter-form button {
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .filter-form button:hover {
            background-color: #34495e;
        }

        /* Styling for news results */
        .news-list {
            margin-top: 20px;
        }

        .news-item {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        .news-item h3 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            color: #2c3e50;
        }

        .news-item p {
            color: #666;
        }
    </style>
</head>
<body>

    <!-- Menu Bar with Profile Button -->
    <div class="menu-bar">
        <h1>Flash Feed</h1>
        <button class="profile-button" onclick="toggleDropdown()">
            <img src="profile_icon.png" alt="Profile Icon">
        </button>
        
        <!-- Dropdown Menu -->
        <div class="dropdown" id="dropdown-menu">
            <a href="#">Profile</a>
            <a href="request_sojung.html">Request News</a>
            <a href="history_sojung.html">Manage History</a>
            <a href="#">Login/Logout</a>
        </div>
    </div>

    <div class="container">
        <h1>Request News</h1>
        <form class="filter-form" onsubmit="fetchNews(); return false;">

            <!-- Keyword selection -->
            <label for="keyword">Keyword:</label>
            <input type="text" id="keyword" name="keyword" placeholder="Enter a keyword..." required>

            <!-- Category selection -->
            <label for="category">Category:</label>
            <select id="category" required>
                <option value="general">General</option>
                <option value="technology">Technology</option>
                <option value="business">Business</option>
                <option value="sports">Sports</option>
                <!-- Add more categories as needed -->
            </select>

            <!-- Location input -->
            <label for="location">Location:</label>
            <input type="text" id="location" placeholder="Enter a location">

            <!-- Date selection -->
            <label for="date">Date:</label>
            <input type="date" id="date">

            <!-- Length selection -->
            <label for="length">Length:</label>
            <select id="length" required>
                <option value="short">Short (1-3 mins)</option>
                <option value="medium">Medium (4-7 mins)</option>
                <option value="long">Long (8+ mins)</option>
            </select>

            <!-- Submit button -->
            <button type="submit">Request News</button>
        </form>

        <!-- News results -->
        <div class="news-list" id="news-list"></div>
    </div>

    <script>
        // Function to simulate fetching news articles based on filters
        function fetchNews() {
            // Get user inputs
            const keyword = document.getElementById('keyword').value;
            const category = document.getElementById('category').value;
            const location = document.getElementById('location').value;
            const date = document.getElementById('date').value;
            const length = document.getElementById('length').value;


            // Log the inputs (this is where you would send the data to the backend)
            console.log("Searching news with the following criteria:");
            console.log("Keyword:", keyword);
            console.log("Category:", category);
            console.log("Location:", location);
            console.log("Date:", date);
            console.log("Length:", length);

            // Functionality to send this data to the backend or display the filtered results goes here (not implemented yet - just with the samples)


            // For testing, we create some dummy news articles
            const sampleNews = [
                { title: "Tech Update", keyword: "computer", category: "technology", location: "USA", date: "2024-10-01", length: "medium", content: "Latest tech news..." },
                { title: "Business Insights", keyword: "market", category: "business", location: "Global", date: "2024-10-10", length: "short", content: "Market analysis..." },
                { title: "Sports Highlights", keyword: "football", category: "sports", location: "Europe", date: "2024-09-15", length: "long", content: "Football highlights..." },
                // Add more dummy articles as needed
            ];

            // Filter sample news based on user criteria
            const filteredNews = sampleNews.filter(news => 
                (!keyword || news.keyword.toLowerCase().includes(keyword.toLowerCase())) &&
                (!category || news.category === category) &&
                (!location || news.location.toLowerCase().includes(location.toLowerCase())) &&
                (!date || news.date === date) &&
                (!length || news.length === length)
            );

            

            // Display the results
            const newsList = document.getElementById('news-list');
            newsList.innerHTML = ""; // Clear previous results
            if (filteredNews.length > 0) {
                filteredNews.forEach(news => {
                    const newsItem = document.createElement('div');
                    newsItem.classList.add('news-item');
                    newsItem.innerHTML = `
                        <h3>${news.title}</h3>
                        <p><strong>Keyword:</strong> ${news.keyword}</p>
                        <p><strong>Category:</strong> ${news.category}</p>
                        <p><strong>Location:</strong> ${news.location}</p>
                        <p><strong>Date:</strong> ${news.date}</p>
                        <p><strong>Content:</strong> ${news.content}</p>
                    `;
                    newsList.appendChild(newsItem);
                });
            } else {
                newsList.innerHTML = "<p>No news articles match your criteria.</p>";
            }
        }

        





        // Dropdown functionality
        function toggleDropdown() {
            const dropdown = document.getElementById('dropdown-menu');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        // Hide dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const profileButton = document.querySelector('.profile-button');
            const dropdown = document.getElementById('dropdown-menu');
            if (!profileButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.style.display = 'none'; // Hide dropdown if clicked outside
            }
        });



    </script>

</body>
</html>
