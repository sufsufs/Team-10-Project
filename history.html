<!DOCTYPE html>
<!-- Written by Shiv -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Feed - Manage History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        /* Menu Bar */
        .menu-bar {
            background-color: #2c3e50;
            color: white;
            padding: 10px 0;
            position: relative;
            text-align: center;
        }

        .menu-bar h1 {
            font-size: 2.5rem;
            margin: 0;
            color: white;
        }

        .profile-button {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
        }

        .profile-button img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        /* Dropdown menu styling */
        .dropdown {
            display: none;
            position: absolute;
            top: 70px;
            right: 20px;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
            overflow: hidden;
            z-index: 1; /* Ensure dropdown is on top */
        }

        .dropdown a {
            display: block;
            padding: 10px 15px;
            color: #333;
            text-decoration: none;
        }

        .dropdown a:hover {
            background-color: #f5f5f5;
        }

        /* Main Container */
        .container {
            width: 80%;
            margin: 20px auto;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .history-header h2 {
            font-size: 1.8rem;
            color: #444;
        }

        .button-group {
            display: flex;
            align-items: center;
        }

        /* Styling for Clear History button */
        .clear-history {
            background-color: #d3d3d3;
            color: black;
            border: none;
            padding: 10px 15px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-right: 10px;
        }

        .clear-history:hover {
            background-color: #6c757d;
        }

        /* Styling for Search input */
        .search {
            width: 200px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        /* Table styling */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table th, table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* No History message styling */
        .no-history {
            text-align: center;
            font-size: 1.2rem;
            color: #999;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <!-- Menu Bar with Profile Button -->
    <div class="menu-bar">
        <h1>Flash Feed</h1>
        <button class="profile-button" onclick="toggleDropdown()">
            <img src="profile_icon.png" alt="Profile Icon">
        </button>
        
        <!-- Dropdown Menu -->
        <div class="dropdown" id="dropdown-menu">
            <a href="#">Profile</a>
            <a href="history.html">Manage History</a>
            <a href="#">Login/Logout</a>
        </div>
    </div>

    <div class="container">
        <!-- History header with title and buttons aligned on the same line -->
        <div class="history-header">
            <h2>Reading History</h2>
            <div class="button-group">
                <button class="clear-history" onclick="clearHistory()">Clear History...</button>
                <input type="text" class="search" placeholder="Search..." onkeyup="filterHistory()">
            </div>
        </div>

        <!-- FOR TESTING PURPOSES ONLY; Input fields to add a new article -->
        
        <div class="add-article">
            <input type="text" id="article-title" placeholder="Article Title" required>
            <input type="text" id="article-address" placeholder="Article Address" required>
            <button onclick="addHistory()">Add Article</button>
        </div>
        
        <!-- Table for reading history -->
        <table id="history-table">
            <thead>
                <tr>
                    <th>Article</th>
                    <th>Address</th>
                </tr>
            </thead>
            <tbody>
                <!-- Initially empty; will show "No History" message -->
            </tbody>
        </table>

        <!-- No History message -->
        <div class="no-history" id="no-history-message">
            No History
        </div>
    </div>

    <script>
        function addHistory() {
            // Get the values from the input fields
            const title = document.getElementById('article-title').value;
            const address = document.getElementById('article-address').value;

            // Check if the inputs are not empty
            if (title && address) {
                // Create a new row and cells
                const newRow = document.createElement('tr');
                const titleCell = document.createElement('td');
                const addressCell = document.createElement('td');

                // Set the text content of the title cell
                titleCell.textContent = title;

                // Create an anchor element for the address
                const addressLink = document.createElement('a');
                addressLink.href = address.startsWith('http') ? address : 'http://' + address; // Ensure the URL is valid
                addressLink.target = '_blank'; // Open in a new tab
                addressLink.textContent = address; // Set the link text

                // Append the anchor to the address cell
                addressCell.appendChild(addressLink);

                // Append the cells to the new row
                newRow.appendChild(titleCell);
                newRow.appendChild(addressCell);

                // Insert the new row at the beginning of the table body
                const tableBody = document.getElementById('history-table').querySelector('tbody');
                tableBody.insertBefore(newRow, tableBody.firstChild); // Insert new row at the top

                // Clear the input fields after adding the row
                document.getElementById('article-title').value = '';
                document.getElementById('article-address').value = '';

                // Hide the "No History" message if there are entries
                document.getElementById('no-history-message').style.display = 'none';
            } else {
                alert("Please fill in both fields.");
            }
        }

        function clearHistory() {
            // Show a confirmation dialog
            const confirmation = confirm("Are you sure you want to clear the reading history?");
            if (confirmation) {
                const tableBody = document.getElementById('history-table').querySelector('tbody');
                tableBody.innerHTML = ''; // Clear all rows in the table body

                // Show the "No History" message
                document.getElementById('no-history-message').style.display = 'block';
            }
        }

        function filterHistory() {
            // Get the search input value
            const searchValue = document.querySelector('.search').value.toLowerCase();
            const tableRows = document.querySelectorAll('#history-table tbody tr');

            // Loop through all table rows and hide those that don't match the search
            let hasVisibleRows = false; // Track if any rows are visible
            tableRows.forEach(row => {
                const title = row.cells[0].textContent.toLowerCase();
                // Only check the title for matches
                if (title.includes(searchValue)) {
                    row.style.display = ''; // Show the row
                    hasVisibleRows = true; // Set to true if any row is visible
                } else {
                    row.style.display = 'none'; // Hide the row
                }
            });

            // Show or hide the "No History" message based on row visibility
            document.getElementById('no-history-message').style.display = hasVisibleRows ? 'none' : 'block';
        }

        // Dropdown functionality
        function toggleDropdown() {
            const dropdown = document.getElementById('dropdown-menu');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        // Hide dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const profileButton = document.querySelector('.profile-button');
            const dropdown = document.getElementById('dropdown-menu');
            if (!profileButton.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.style.display = 'none'; // Hide dropdown if clicked outside
            }
        });
    </script>
</body>
</html>
